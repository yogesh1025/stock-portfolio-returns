<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Compounding in Action</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0a0c0b;--panel:#121614;--panel-2:#161b19;--line:#232b28;--txt:#e8efe9;--muted:#8a978f;--accent:#34d399;--accent-dim:#0f3d2e;--loss:#f87171;--gold:#e2b659;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(1200px 600px at 80% -10%,#11241c 0%,transparent 55%),radial-gradient(900px 500px at -10% 110%,#1a1410 0%,transparent 50%),var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:28px 20px 60px;}
  .wrap{max-width:1080px;margin:0 auto;}
  header{margin-bottom:8px;text-align:center;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  h1{font-family:'Fraunces',serif;font-weight:900;line-height:1.1;letter-spacing:-.02em;text-align:center;width:100%;}
  h1 em{font-style:italic;color:var(--gold);margin:0 .06em;}
  .hamburger{position:fixed;top:10px;left:10px;z-index:40;width:38px;height:38px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;}
  .hamburger:hover{border-color:var(--accent);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s;z-index:45;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;left:0;height:100%;width:340px;max-width:86vw;background:var(--panel);border-right:1px solid var(--line);z-index:50;transform:translateX(-102%);transition:transform .25s ease;overflow-y:auto;}
  .drawer.open{transform:translateX(0);}
  .drawer-inner{padding:24px 22px 40px;}
  .drawer h2{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
  .drawer hr{border:none;border-top:1px solid var(--line);margin:26px 0 22px;}
  label{display:block;font-size:13px;color:var(--muted);margin:0 0 7px;}
  .field{margin-bottom:18px;}
  input[type=text],input[type=number]{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:15px;outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--accent);}
  .hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;}
  .toggle{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
  .switch{position:relative;width:46px;height:26px;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;transition:background .2s;flex:none;}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s;}
  input[type=checkbox]{display:none;}
  input[type=checkbox]:checked+.switch{background:var(--accent-dim);border-color:var(--accent);}
  input[type=checkbox]:checked+.switch::after{transform:translateX(20px);background:var(--accent);}
  .toggle span{font-size:14px;color:var(--txt);}
  .radiogroup{display:flex;flex-direction:column;gap:9px;}
  .radio{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;color:var(--txt);}
  .radio input[type=radio]{appearance:auto;-webkit-appearance:radio;display:inline-block;width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex:none;margin:0;}
  button.run{width:100%;margin-top:6px;background:var(--accent);color:#06140d;border:none;border-radius:10px;padding:14px;font-weight:600;font-size:15px;font-family:'IBM Plex Sans';cursor:pointer;transition:filter .15s,transform .05s;}
  button.run:hover{filter:brightness(1.08);}
  button.run:active{transform:translateY(1px);}
  button.run:disabled{opacity:.5;cursor:not-allowed;}
  .err{color:var(--loss);font-size:13px;margin-top:12px;min-height:16px;}
  .controls{display:flex;flex-direction:column;gap:16px;}
  .ctrlrow{display:flex;gap:10px;}
  .ctrlbtn{flex:1;background:var(--panel-2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px 14px;cursor:pointer;font-size:13px;font-family:'IBM Plex Mono',monospace;}
  .ctrlbtn:hover{border-color:var(--accent);}
  .ctrlbtn:disabled{opacity:.45;cursor:not-allowed;}
  .speedwrap{display:flex;align-items:center;gap:12px;}
  .speedwrap label{margin:0;white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-size:12px;}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;background:var(--line);flex:1;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border:none;border-radius:50%;background:var(--accent);cursor:pointer;}
  .speedval{font-family:'IBM Plex Mono',monospace;color:var(--accent);width:46px;text-align:right;}
  .hero{width:100%;max-width:1080px;margin:22px auto 0;aspect-ratio:16/9;display:flex;flex-direction:column;gap:12px;min-height:0;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;}
  .summary,.statrow4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:none;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 16px;}
  .stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;}
  .stat .v{font-family:'IBM Plex Mono',monospace;font-size:clamp(15px,1.7vw,21px);font-weight:600;margin-top:6px;}
  .v.pos{color:var(--accent);}.v.neg{color:var(--loss);}.v.gold{color:var(--gold);}
  .chartcard{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;padding:14px 18px 10px;}
  .livebar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;flex-wrap:wrap;gap:8px;flex:none;}
  .livedate{font-family:'IBM Plex Mono',monospace;color:var(--gold);font-size:14px;}
  .liveval{font-family:'IBM Plex Mono',monospace;font-size:clamp(20px,2.4vw,26px);font-weight:600;}
  .chart-holder{position:relative;flex:1 1 auto;min-height:0;}
  .chart-holder canvas{position:absolute;inset:0;}
  .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;font-size:15px;}
  .countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;font-size:clamp(80px,16vw,180px);color:var(--gold);}
  .hidden{display:none!important;}
  .pill{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
  @media(max-width:760px){.hero{aspect-ratio:auto;}.summary,.statrow4{grid-template-columns:repeat(2,1fr);}.chartcard{min-height:300px;}header{margin-top:72px;}.headline-desktop{display:none!important;}.headline-mobile{display:flex;flex-direction:column;align-items:center;gap:4px;}}
  @media(min-width:761px){.headline-mobile{display:none!important;}}
  .hl-line{font-family:'Fraunces',serif;font-weight:900;letter-spacing:-.02em;line-height:1.1;white-space:nowrap;text-align:center;width:100%;}
  .hl-line em{font-style:italic;color:var(--gold);margin:0 .06em;}
  .suggest-box{position:absolute;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;z-index:9999;width:100%;margin-top:4px;max-height:260px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .suggest-item{padding:10px 14px;cursor:pointer;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid var(--line);transition:background .12s;}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover,.suggest-item.active{background:var(--accent-dim);}
  .suggest-sym{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);font-weight:600;}
  .suggest-name{font-size:12px;color:var(--muted);}
  .field{position:relative;}
  .ticker-wrap{position:relative;display:flex;align-items:center;gap:8px;}
  .ticker-wrap input{flex:1;}
  .clear-btn{flex:none;background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:8px;width:32px;height:42px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s;}
  .clear-btn:hover{border-color:var(--loss);color:var(--loss);}
</style>
</head>
<body>
<button class="hamburger" id="hamburger" aria-label="Open menu">&#9776;</button>
<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-inner">
    <h2>Setup</h2>
    <div class="field">
      <label for="ticker">Stock ticker</label>
      <div class="ticker-wrap">
        <input type="text" id="ticker" placeholder="e.g. AAPL, MSFT, TSLA" autocomplete="off" />
        <button class="clear-btn" id="clearBtn" title="Clear">&#x2715;</button>
      </div>
    </div>
    <div class="field">
      <label for="companyName">Company name (shown in headline)</label>
      <input type="text" id="companyName" placeholder="e.g. Apple Inc." autocomplete="off" />
    </div>
    <div class="field">
      <label for="initial">Initial investment</label>
      <input type="number" id="initial" value="1000" min="1" step="any" />
    </div>
    <div class="field">
      <label for="reinvest" style="margin-bottom:10px">Dividends</label>
      <label class="toggle">
        <input type="checkbox" id="reinvest" />
        <span class="switch"></span>
        <span>Reinvest dividends (DRIP)</span>
      </label>
    </div>
    <div class="field">
      <label>Currency symbol</label>
      <div class="radiogroup">
        <label class="radio"><input type="radio" name="cur" value="$" checked /><span>Dollar ($)</span></label>
        <label class="radio"><input type="radio" name="cur" value="&euro;" /><span>Euro (&euro;)</span></label>
        <label class="radio"><input type="radio" name="cur" value="&#8377;" /><span>INR (&#8377;)</span></label>
        <label class="radio"><input type="radio" name="cur" value="&pound;" /><span>Pound (&pound;)</span></label>
        <label class="radio"><input type="radio" name="cur" value="&yen;" /><span>Yen (&yen;)</span></label>
      </div>
    </div>
    <div class="field">
      <label for="subpoints">Smoothness (sub-points per day)</label>
      <input type="number" id="subpoints" value="50" min="1" step="1" />
      <div class="hint">Higher = silkier. Default 50. Try 100 for ultra-smooth.</div>
    </div>
    <button class="run" id="runBtn">Run simulation</button>
    <div class="err" id="err"></div>
    <hr />
    <h2>Playback</h2>
    <div class="controls">
      <div class="ctrlrow">
        <button class="ctrlbtn" id="playBtn" disabled>Play</button>
        <button class="ctrlbtn" id="restartBtn" disabled>Restart</button>
      </div>
      <div class="speedwrap">
        <label>SPEED</label>
        <input type="range" id="speed" min="1" max="5" step="1" value="1" />
        <span class="speedval" id="speedVal">1x</span>
      </div>
    </div>
  </div>
</aside>

<div class="wrap">
  <header>
    <div class="eyebrow">Portfolio Compounding in Action</div>
    <h1 id="headline" class="headline-desktop"></h1>
    <div class="headline-mobile" id="headlineMobile">
      <div class="hl-line" id="hlLine1"></div>
      <div class="hl-line" id="hlLine2"></div>
    </div>
  </header>
  <div class="hero" id="hero">
    <div class="summary">
      <div class="stat"><div class="k">Portfolio Growth</div><div class="v" id="sGrowth">&mdash;</div></div>
      <div class="stat"><div class="k">Return (to date)</div><div class="v" id="sReturn">&mdash;</div></div>
      <div class="stat"><div class="k">CAGR</div><div class="v" id="sCagr">&mdash;</div></div>
      <div class="stat"><div class="k">Held</div><div class="v" id="sYears">&mdash;</div></div>
    </div>
    <div class="card chartcard">
      <div class="livebar">
        <div>
          <div class="pill" id="liveLabel">SHARE PRICE</div>
          <div class="liveval" id="liveVal">&mdash;</div>
        </div>
        <div class="livedate" id="liveDate"></div>
      </div>
      <div class="chart-holder">
        <div class="placeholder" id="ph">Search the Stock</div>
        <div class="countdown hidden" id="countdown"></div>
        <canvas id="chart" class="hidden"></canvas>
      </div>
    </div>
    <div class="statrow4">
      <div class="stat"><div class="k">Shares Held</div><div class="v" id="sShares">&mdash;</div></div>
      <div class="stat"><div class="k">Dividends Paid</div><div class="v" id="sDiv">&mdash;</div></div>
      <div class="stat"><div class="k">Dividend Yield</div><div class="v" id="sYield">&mdash;</div></div>
      <div class="stat"><div class="k">Company Valuation</div><div class="v" id="sMktCap">&mdash;</div></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

/* ── Currency ── */
let CUR = '$';
const fmtUSD  = n => CUR + Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtUSD2 = n => CUR + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtNum  = n => Number(n).toLocaleString('en-US',{maximumFractionDigits:2});
function fmtBig(n){
  const a=Math.abs(n);
  if(a>=1e12)return CUR+(n/1e12).toFixed(2)+'T';
  if(a>=1e9) return CUR+(n/1e9).toFixed(2)+'B';
  if(a>=1e6) return CUR+(n/1e6).toFixed(2)+'M';
  if(a>=1e3) return CUR+(n/1e3).toFixed(1)+'K';
  return CUR+Math.round(n);
}

/* ── State ── */
let chart=null, DATA=null, raf=null;
let progress=0, animLastTs=null, playing=false, curK=0;
const SEC_PER_YEAR=20;
const TICK_COUNT=6;
const priceOf = p => p.price!=null?p.price:(p.v!=null?p.v:0);
const lerp    = (a,b,t) => (a!=null&&b!=null)?a+(b-a)*t:(a!=null?a:null);

/* ── Drawer ── */
const openDrawer  = ()=>{$('drawer').classList.add('open');   $('overlay').classList.add('open');};
const closeDrawer = ()=>{$('drawer').classList.remove('open');$('overlay').classList.remove('open');};
$('hamburger').addEventListener('click',openDrawer);
$('overlay').addEventListener('click',closeDrawer);

/* ── Headline ── */
const MIN_SIZE=10,MAX_SIZE=160;
const getLabel=()=>$('companyName').value.trim()||$('ticker').value.trim().toUpperCase()||'\u2014';
const getVal  =()=>{const v=parseFloat($('initial').value);return v>0?fmtUSD(v):'\u2014';};
function bsearchSize(el,maxW){
  let lo=MIN_SIZE,hi=MAX_SIZE,best=MIN_SIZE;
  while(lo<=hi){const m=(lo+hi)>>1;el.style.fontSize=m+'px';if(el.scrollWidth<=maxW){best=m;lo=m+1;}else hi=m-1;}
  el.style.fontSize=best+'px';return best;
}
function fitHeadline(){
  const mobile=window.innerWidth<=760,W=($('hero')||document.body).clientWidth;
  if(!mobile){
    const el=$('headline');el.style.whiteSpace='nowrap';
    el.innerHTML='Performance of <em>'+getVal()+'</em> invested in IPO of <em>'+getLabel()+'</em>';
    bsearchSize(el,W);el.style.whiteSpace='';
  }else{
    const l1=$('hlLine1'),l2=$('hlLine2');
    l1.style.whiteSpace=l2.style.whiteSpace='nowrap';
    l1.innerHTML='Performance of <em>'+getVal()+'</em> invested in';
    l2.innerHTML='IPO of <em>'+getLabel()+'</em>';
    const u=Math.min(bsearchSize(l1,W),bsearchSize(l2,W));
    l1.style.fontSize=l2.style.fontSize=u+'px';
  }
}
const updateHeadline=()=>fitHeadline();

/* ── Upsample ── */
function upsampleData(){
  const pts=DATA.points;if(!pts||pts.length<2)return;
  const STEPS=Math.max(1,parseInt($('subpoints').value,10)||50);
  const out=[];
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    const tA=new Date(a.t).getTime(),tB=new Date(b.t).getTime();
    const pA=priceOf(a),pB=priceOf(b),vA=a.v??0,vB=b.v??0;
    for(let s=0;s<STEPS;s++){
      const f=s/STEPS,ease=f*f*(3-2*f),ts=tA+(tB-tA)*f;
      out.push({
        _ts:ts,
        t:new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short'}),
        price:pA+(pB-pA)*ease,v:vA+(vB-vA)*ease,
        shares:lerp(a.shares,b.shares,f),div_cum:lerp(a.div_cum,b.div_cum,f),
        yield:a.yield??null,mktcap:lerp(a.mktcap,b.mktcap,f),
      });
    }
  }
  const last=pts[pts.length-1],lts=new Date(last.t).getTime();
  out.push({_ts:lts,t:new Date(lts).toLocaleDateString('en-US',{year:'numeric',month:'short'}),
    price:priceOf(last),v:last.v??0,shares:last.shares??null,
    div_cum:last.div_cum??null,yield:last.yield??null,mktcap:last.mktcap??null});
  DATA.points=out;
}

/* ── Build split plot ── */
function buildSplitPlot(){
  DATA._splitPlot=[];
  if(!DATA.splits||!DATA.points.length)return;
  DATA.splits.forEach(s=>{
    const st=new Date(s.t).getTime();
    let idx=DATA.points.findIndex(p=>p._ts>=st);
    if(idx<0)idx=DATA.points.length-1;
    DATA._splitPlot.push({idx,ratio:s.ratio});
  });
}

/* ── Build yield steps ── */
function buildYieldSteps(){
  DATA._yieldStep=[];
  const pts=DATA.points;if(!pts?.length)return;
  let held=0,prevDiv=pts[0].div_cum??0;
  for(let i=0;i<pts.length;i++){
    const dc=pts[i].div_cum??0;
    if(i>0&&dc>prevDiv+1e-9)held=pts[i].yield??held;
    prevDiv=dc;DATA._yieldStep[i]=held;
  }
}

/* ── X-axis label generator ──
   Called every frame with the current k (how many points drawn).
   Returns an array of TICK_COUNT evenly-spaced date labels
   derived from pts[0.._ts] .. pts[k-1._ts] — i.e. the visible range only.
   Each label sits at positions [0, k/5, 2k/5, 3k/5, 4k/5, k-1]
   so they always spread across exactly what's been drawn.
*/
function makeXLabels(k){
  const pts=DATA.points,n=pts.length;
  const labels=new Array(k).fill('');
  for(let i=0;i<TICK_COUNT;i++){
    const idx=Math.round(i*(k-1)/(TICK_COUNT-1));
    if(idx<k) labels[idx]=pts[idx].t;
  }
  return labels;
}

/* ── Split markers plugin ── */
const splitPlugin={
  id:'splitMarkers',
  afterDatasetsDraw(c){
    if(!DATA?._splitPlot)return;
    const{ctx,chartArea:ca}=c,x=c.scales.x;
    ctx.save();ctx.font="10px 'IBM Plex Mono',monospace";
    DATA._splitPlot.forEach(sp=>{
      if(sp.idx>=curK)return;
      const px=x.getPixelForValue(sp.idx);
      if(px<ca.left-1||px>ca.right+1)return;
      ctx.beginPath();ctx.setLineDash([4,4]);
      ctx.strokeStyle='rgba(226,182,89,0.55)';ctx.lineWidth=1;
      ctx.moveTo(px,ca.top);ctx.lineTo(px,ca.bottom);ctx.stroke();ctx.setLineDash([]);
      ctx.save();ctx.translate(px,ca.top+4);ctx.rotate(Math.PI/2);
      ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle='#e2b659';
      ctx.fillText('Stock split ('+sp.ratio+')',0,-3);ctx.restore();
    });
    ctx.restore();
  }
};

/* ── Build chart ──
   Category scale. Labels start empty — applyFrame fills them each frame
   with TICK_COUNT evenly-spaced dates from the current visible range.
   Grid lines stay fixed at those 6 positions and their labels update
   as the animation extends the visible range.
*/
function buildChart(){
  const ctx=$('chart').getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,500);
  grad.addColorStop(0,'rgba(52,211,153,0.6)');
  grad.addColorStop(0.4,'rgba(52,211,153,0.2)');
  grad.addColorStop(1,'rgba(52,211,153,0.0)');
  if(chart)chart.destroy();
  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels:[],
      datasets:[{data:[],borderColor:'#34d399',borderWidth:2,
        backgroundColor:grad,fill:true,pointRadius:0,tension:0.15}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{intersect:false,mode:'index'},
      scales:{
        x:{
          type:'category',
          grid:{display:false},
          ticks:{
            color:'#8a978f',font:{family:'IBM Plex Mono',size:10},
            maxRotation:0,autoSkip:false,
            // Only show ticks where label is non-empty
            callback:function(val,idx){
              return chart.data.labels[idx]||'';
            }
          },
          border:{display:false},
        },
        y:{
          grid:{display:false},
          ticks:{color:'#8a978f',font:{family:'IBM Plex Mono',size:10},
            callback:v=>CUR+Number(v).toLocaleString('en-US',{maximumFractionDigits:0})},
          border:{display:false},
        }
      },
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:items=>{const idx=items[0].dataIndex;return DATA?.points[idx]?.t??'';},
          label:c=>fmtUSD2(c.parsed.y)
        }}
      }
    },
    plugins:[splitPlugin]
  });
}

/* ── applyFrame ──
   Every frame:
   1. Slice pts[0..k] for data
   2. Generate fresh x labels for the current k — TICK_COUNT dates
      spread evenly across [0..k-1] so they always cover the visible range
   3. Update chart — grid lines and labels adapt automatically
*/
function applyFrame(){
  if(!DATA)return;
  const pts=DATA.points,n=pts.length;
  const k=Math.max(1,Math.min(n,Math.round(progress*n)));
  curK=k;
  const cur=pts[k-1];

  // Fresh labels for current visible range — 6 dates spread across [0..k-1]
  chart.data.labels=makeXLabels(k);
  chart.data.datasets[0].data=pts.slice(0,k).map(p=>p.price);
  chart.update('none');

  // Live display
  const base=pts[0].price,now=cur.price;
  $('liveVal').textContent=fmtUSD2(now);
  $('liveVal').style.color=now>=base?'var(--accent)':'var(--loss)';
  $('liveDate').textContent=cur.t;

  // Stats
  const init=DATA.summary.initial,curV=cur.v??0;
  const elapsed=DATA.summary.years*progress;
  const ret=(curV/init-1)*100;
  const cagr=elapsed>0?(Math.pow(curV/init,1/elapsed)-1)*100:0;
  const cls=ret>=0?'pos':'neg';
  $('sGrowth').textContent=fmtUSD(curV);     $('sGrowth').className='v '+cls;
  $('sReturn').textContent=(ret>=0?'+':'')+ret.toLocaleString('en-US',{maximumFractionDigits:0})+'%';
  $('sReturn').className='v '+cls;
  $('sCagr').textContent=cagr.toFixed(1)+'%';$('sCagr').className='v '+cls;
  $('sYears').textContent=elapsed.toFixed(1)+' yr';$('sYears').className='v';

  const shares=cur.shares??0,divCum=cur.div_cum??0;
  const dYield=DATA._yieldStep?.length
    ?DATA._yieldStep[Math.min(k-1,DATA._yieldStep.length-1)]
    :(cur.yield??0);
  $('sShares').textContent=fmtNum(shares)+' shares';$('sShares').className='v';
  $('sDiv').textContent=fmtUSD2(divCum);            $('sDiv').className='v gold';
  $('sYield').textContent=dYield.toFixed(2)+'%';    $('sYield').className='v '+(dYield>0?'pos':'');
  if(cur.mktcap!=null){$('sMktCap').textContent=fmtBig(cur.mktcap);$('sMktCap').className='v pos';}
  else{$('sMktCap').textContent='\u2014';$('sMktCap').className='v';}
}

/* ── Animation ── */
function tick(now){
  if(!playing)return;
  if(animLastTs===null)animLastTs=now;
  const dt=(now-animLastTs)/1000;animLastTs=now;
  progress+=(dt/(DATA.summary.years*SEC_PER_YEAR))*parseFloat($('speed').value);
  if(progress>=1){progress=1;applyFrame();stop();return;}
  applyFrame();raf=requestAnimationFrame(tick);
}
function play(){
  if(!DATA)return;if(progress>=1)progress=0;
  playing=true;animLastTs=null;$('playBtn').textContent='Pause';
  raf=requestAnimationFrame(tick);
}
function stop(){
  playing=false;if(raf)cancelAnimationFrame(raf);raf=null;
  $('playBtn').textContent=progress>=1?'Replay':'Play';
}

/* ── Countdown ── */
function countdownThenPlay(){
  const el=$('countdown');let n=3;el.textContent=n;el.classList.remove('hidden');
  const iv=setInterval(()=>{n--;if(n<=0){clearInterval(iv);el.classList.add('hidden');play();}else el.textContent=n;},1000);
}

/* ── Currency ── */
function onCurrencyChange(sym){CUR=sym;updateHeadline();if(DATA){applyFrame();chart?.update('none');}}

/* ── Run ── */
async function run(){
  const ticker=$('ticker').value.trim(),initial=parseFloat($('initial').value),reinvest=$('reinvest').checked;
  $('err').textContent='';
  if(!ticker){$('err').textContent='Enter a stock ticker.';return;}
  if(!(initial>0)){$('err').textContent='Initial investment must be greater than 0.';return;}
  $('runBtn').disabled=true;$('runBtn').textContent='Fetching history...';
  try{
    const res=await fetch('/api/simulate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker,initial,reinvest})});
    const json=await res.json();
    if(!res.ok)throw new Error(json.error||'Request failed');
    DATA=json;
    updateHeadline();
    $('ph').classList.add('hidden');$('chart').classList.remove('hidden');
    $('liveLabel').textContent=($('companyName').value.trim()||ticker.toUpperCase())+' / share price';
    $('playBtn').disabled=false;$('restartBtn').disabled=false;
    upsampleData();
    buildSplitPlot();
    buildYieldSteps();
    buildChart();
    progress=0;applyFrame();
    closeDrawer();
    countdownThenPlay();
  }catch(e){$('err').textContent=e.message;}
  finally{$('runBtn').disabled=false;$('runBtn').textContent='Run simulation';}
}

/* ── Events ── */
$('runBtn').addEventListener('click',run);
let suggestTimer=null,suggestActive=-1;
function closeSuggest(){document.getElementById('suggestBox')?.remove();suggestActive=-1;}
function renderSuggest(results){
  closeSuggest();if(!results.length)return;
  const box=document.createElement('div');box.id='suggestBox';box.className='suggest-box';
  results.forEach(r=>{
    const item=document.createElement('div');item.className='suggest-item';
    item.innerHTML=`<span class="suggest-sym">${r.symbol}</span><span class="suggest-name">${r.name}</span>`;
    item.addEventListener('mousedown',e=>{e.preventDefault();$('ticker').value=r.symbol;$('companyName').value=r.name;closeSuggest();updateHeadline();});
    box.appendChild(item);
  });
  $('ticker').parentElement.parentElement.appendChild(box);
}
$('ticker').addEventListener('input',()=>{
  updateHeadline();clearTimeout(suggestTimer);
  const q=$('ticker').value.trim();if(q.length<1){closeSuggest();return;}
  suggestTimer=setTimeout(async()=>{try{const r=await fetch(`/api/search?q=${encodeURIComponent(q)}`);renderSuggest(await r.json());}catch{}},220);
});
$('ticker').addEventListener('keydown',e=>{
  const box=document.getElementById('suggestBox'),items=box?box.querySelectorAll('.suggest-item'):[];
  if(e.key==='ArrowDown'){e.preventDefault();suggestActive=Math.min(suggestActive+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===suggestActive));}
  else if(e.key==='ArrowUp'){e.preventDefault();suggestActive=Math.max(suggestActive-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===suggestActive));}
  else if(e.key==='Enter'){if(suggestActive>=0&&items[suggestActive])items[suggestActive].dispatchEvent(new MouseEvent('mousedown'));else run();}
  else if(e.key==='Escape')closeSuggest();
});
document.addEventListener('click',e=>{if(!$('ticker').contains(e.target))closeSuggest();});
$('clearBtn').addEventListener('click',()=>{$('ticker').value='';$('companyName').value='';closeSuggest();updateHeadline();$('ticker').focus();});
$('companyName').addEventListener('input',updateHeadline);
$('initial').addEventListener('input',updateHeadline);
$('playBtn').addEventListener('click',()=>playing?stop():play());
$('restartBtn').addEventListener('click',()=>{progress=0;applyFrame();play();});
$('speed').addEventListener('input',()=>{$('speedVal').textContent=parseInt($('speed').value,10)+'x';});
document.querySelectorAll('input[name=cur]').forEach(r=>r.addEventListener('change',e=>{if(e.target.checked)onCurrencyChange(e.target.value);}));
window.addEventListener('resize',updateHeadline);
updateHeadline();
document.fonts?.ready.then(()=>updateHeadline());
</script>
<script src="/static/theme-panel.js"></script>
